databases:
  - name: upskill-coach-db
    plan: basic-256mb
    region: virginia
    databaseName: upskill_coach
    user: upskill_coach_user

services:
  - type: web
    name: upskill-coach
    runtime: python
    plan: starter
    region: virginia
    # Build:
    #   1. Install Python deps
    #   2. Install Inter OTF into the user's font dir + refresh fontconfig
    #      cache so Manim's Pango/Cairo finds it. We use ~/.fonts (no sudo
    #      needed on Render) — Pango walks user font dirs by default. The
    #      same Inter font is embedded in the browser via @font-face so
    #      server-measured text widths match browser-rendered widths
    #      (= no layout drift).
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p $HOME/.fonts
      cp fonts/inter/*.otf $HOME/.fonts/
      fc-cache -fv $HOME/.fonts
    startCommand: python coach.py
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: upskill-coach-db
          property: connectionString
      # PORT is auto-set by Render — do not override
      - key: BIND_HOST
        value: "0.0.0.0"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
