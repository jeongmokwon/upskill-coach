      - key: CRON_SECRET
        sync: false

  - type: cron
    name: sms-evening
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    plan: starter
    region: virginia
    schedule: "0 4 * * *"
    startCommand: |
      curl -fsS -X POST \
        -H "X-Cron-Secret: $CRON_SECRET" \
