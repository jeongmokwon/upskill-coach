databases:
  - name: upskill-coach-db
    plan: basic-256mb
    region: virginia
    databaseName: upskill_coach
    user: upskill_coach_user

services:
  - type: web
    name: upskill-coach
    runtime: python
    plan: starter
    region: virginia
    buildCommand: pip install -r requirements.txt
    startCommand: python coach.py
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: upskill-coach-db
          property: connectionString
      # PORT is auto-set by Render — do not override
      - key: BIND_HOST
        value: "0.0.0.0"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
