databases:
  - name: upskill-coach-db
    plan: free
    databaseName: upskill_coach
    user: upskill_coach_user

services:
  - type: web
    name: upskill-coach
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python coach.py
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: upskill-coach-db
          property: connectionString
      - key: PORT
        value: "8765"
      - key: WS_PORT
        value: "8766"
      - key: BIND_HOST
        value: "0.0.0.0"
      - key: PYTHON_VERSION
        value: "3.11.9"
