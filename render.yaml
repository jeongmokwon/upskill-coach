databases:
  - name: upskill-coach-db
    plan: basic-256mb
    region: virginia
    databaseName: upskill_coach
    user: upskill_coach_user

services:
  - type: web
    name: upskill-coach
    runtime: python
    plan: starter
    region: virginia
    # Build:
    #   1. Install Python deps
    #   2. Install Inter OTF into the project tree itself, then point
    #      fontconfig at it via the FONTCONFIG_PATH / XDG_DATA_HOME env
    #      vars (set further down). We tried $HOME/.fonts originally but
    #      Render's runtime $HOME differs from build $HOME, so the cache
    #      lived in the wrong place and Pango couldn't find Inter at
    #      runtime. Keeping fonts inside the project dir avoids that
    #      mismatch entirely.
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p $HOME/.local/share/fonts
      cp fonts/inter/*.otf $HOME/.local/share/fonts/
      fc-cache -fv $HOME/.local/share/fonts || true
      # Sanity: confirm fontconfig sees Inter after the cache rebuild.
      # Failure here is non-fatal (we'd rather deploy and see the issue
      # than block the build) but the log line tells us at-a-glance
      # whether the install worked.
      fc-list | grep -i inter || echo "WARN: Inter not in fc-list after cache"
    startCommand: python coach.py
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: upskill-coach-db
          property: connectionString
      # PORT is auto-set by Render — do not override
      - key: BIND_HOST
        value: "0.0.0.0"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      # SMS tutor — all set manually in Render dashboard. The web
      # service needs them for /sms/inbound (Twilio signature) and
      # /sms/cron-tick (CRON_SECRET). The cron services below reuse
      # the same values via fromService.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: TUTOR_USER_PHONE
        sync: false
      - key: TUTOR_USER_ID
        sync: false
      - key: CRON_SECRET
        sync: false

  # ─── SMS scheduled-slot triggers ───────────────────────────────────
#
# NOTE: cron jobs are intentionally NOT defined in this Blueprint.
#
# We tried `type: cron` with `runtime: image` (curlimages/curl), but
# Render Blueprint sync repeatedly failed to create these — likely a
# gap in image-runtime cron support via render.yaml. The web service
# above is the only Blueprint-managed thing.
#
# The 4 scheduled SMS slots run as cron services created manually in
# the Render dashboard (New → Cron Job → Deploy an existing image
# → `docker.io/curlimages/curl:latest`). Each one curls
# /sms/cron-tick on the dmmu web service.
#
# Reference values for the 4 manual cron jobs:
#
#   Name              UTC schedule    PT time      Start command
#   ───────────────   ─────────────   ──────────   ────────────────────
#   sms-morning       0 14 * * *      7:00 AM PDT  curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" "https://upskill-coach-dmmu.onrender.com/sms/cron-tick?slot=morning"
#   sms-lunch         0 20 * * *      1:00 PM PDT  curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" "https://upskill-coach-dmmu.onrender.com/sms/cron-tick?slot=lunch"
#   sms-afternoon     0 23 * * *      4:00 PM PDT  curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" "https://upskill-coach-dmmu.onrender.com/sms/cron-tick?slot=afternoon"
#   sms-evening       50 2 * * *      7:50 PM PDT  curl -fsS -X POST -H "X-Cron-Secret: $CRON_SECRET" "https://upskill-coach-dmmu.onrender.com/sms/cron-tick?slot=evening"
#
# (evening moved from 9:00 to 7:50 PDT — see Phase 0/1 flow: the
# earlier ping catches the user closer to when the kid is going down,
# giving more headroom inside their 8-10:30 evening window.)
#
# Each cron also needs env var CRON_SECRET set manually (same value
# as on the dmmu web service).
#
# DST: schedules above are PDT. When PST kicks in (first Sunday of
# November), bump every UTC hour by +1 in the Render dashboard UI.
# Vice versa second Sunday of March.
